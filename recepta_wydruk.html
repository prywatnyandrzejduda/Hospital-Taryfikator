<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recepta - MedWest Hospital</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Roboto',sans-serif;
    background:#020c1b;
    color:white;
    padding:20px;
    text-align:center;
}

.nav-bar{
    max-width:700px;
    margin:0 auto 20px;
    display:flex;
    gap:10px;
}

.btn{
    padding:12px 20px;
    border:none;
    cursor:pointer;
    font-family:'Orbitron';
    font-weight:bold;
    border-radius:6px;
    text-decoration:none;
}

.btn-back{
    background:#1a2a44;
    color:#00d4ff;
    border:1px solid #00d4ff;
}

.btn-copy{
    background:#00ff88;
    color:#020c1b;
    flex-grow:1;
}

#prescription-capture{
    background:white;
    color:black;
    width:700px;
    margin:auto;
    padding:40px;
    text-align:left;
    box-sizing:border-box;
    border-top: 6px solid #c62828;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:3px solid black;
    padding-bottom:15px;
    margin-bottom:25px;
}

.logo{
    max-width:90px;
}

.info{
    margin-bottom:25px;
    line-height:1.8;
}

.box{
    border:1px solid #999;
    padding:15px;
    margin-top:15px;
}

.footer{
    margin-top:50px;
    border-top:1px solid black;
    padding-top:15px;
}

.signature{
    margin-top:40px;
    text-align:right;
}
    .signature div:last-child{
    margin-left:auto;
}
.signature span{
    border-bottom:1px solid black;
    display:inline-block;
    min-width:180px;
    font-weight:bold;
}

.rx-title{
    font-family:'Orbitron';
    font-size:1.3rem;
}
@media (max-width: 768px) {

    #invoice-capture,
    #prescription-capture {
        width: 100%;
        padding: 20px;
    }

    .header {
        flex-direction: column;
        gap: 20px;
        text-align: center;
    }

    .logo {
        max-width: 70px;
    }

}
</style>
</head>
<body>

<div class="nav-bar">
    <a href="recepta.html" class="btn btn-back">⬅ POWRÓT</a>

    <button class="btn btn-copy" onclick="copyAsImage()">
        📸 KOPIUJ RECEPTĘ
    </button>
</div>

<div id="prescription-capture">

<div class="header">

<div>

 <div class="header">

    <div>

        <div class="rx-title">
            MEDICAL PRESCRIPTION
        </div>

        <div>
            MedWest Hospital
        </div>

        <div style="
            color:#c62828;
            font-weight:bold;
            margin-top:5px;">

            OFFICIAL MEDICAL DOCUMENT

        </div>

        <div id="rx-id"
             style="
             font-size:0.8rem;
             color:#666;
             margin-top:5px;">
        </div>

    </div>

    <img src="obraz_2026-05-02_212208153.png"
         class="logo"
         alt="MedWest Logo">

</div>

</div>

<div class="info">

<strong>DATA:</strong>
<span id="rx-date"></span>

<br>

<strong>PACJENT:</strong>
<span id="rx-patient"></span>

<br>

<strong>LEKARZ:</strong>
<span id="rx-doctor"></span>

</div>

<div class="box">

<strong>LEK:</strong><br>
<span id="rx-medicine"></span>

<br><br>

<strong>ILOŚĆ:</strong><br>
<span id="rx-packs"></span> opakowanie(a)

<br><br>

<strong>TYP RECEPTY:</strong><br>
<span id="rx-priority"></span>

<br><br>

<strong>WAŻNOŚĆ:</strong><br>
<span id="rx-validity"></span>

<br><br>

<strong>DAWKOWANIE:</strong><br>
<span id="rx-dosage"></span>

<br><br>

<strong>CZAS TERAPII:</strong><br>
<span id="rx-duration"></span>

</div>

<div class="box">
<strong>ZALECENIA LEKARSKIE:</strong>

<br><br>

<span id="rx-notes"></span>

</div>

<div class="signature">

    <div>
        PODPIS LEKARZA:
        <br><br>

        <span id="rx-sign"></span>
    </div>

    <div style="
    margin-top:30px;
    display:inline-block;
    padding:12px;

    border:3px solid #c62828;

    color:#c62828;

    font-weight:bold;

    transform:rotate(-6deg);

    text-align:center;">

        MEDWEST HOSPITAL

        <br>

        OFFICIAL USE

    </div>

</div>

<div class="footer">

Dokument wygenerowany przez system MedWest Hospital

</div>

</div>

<script>

const data = JSON.parse(localStorage.getItem('lastPrescription'));

if(data){

document.getElementById('rx-date').innerText = data.date;

document.getElementById('rx-patient').innerText = data.patient;

document.getElementById('rx-doctor').innerText = data.doctor;

document.getElementById('rx-sign').innerText = data.doctor;

document.getElementById('rx-medicine').innerText = data.medicine;

document.getElementById('rx-packs').innerText = data.packs;

document.getElementById('rx-priority').innerText = data.priority;

document.getElementById('rx-validity').innerText = data.validity;

document.getElementById('rx-dosage').innerText = data.dosage;

document.getElementById('rx-duration').innerText = data.duration;

document.getElementById('rx-notes').innerText = data.notes;

const year = new Date().getFullYear();

document.getElementById('rx-id').innerText =
`RX-${year}-${Math.floor(Math.random()*900000+100000)}`;

}

async function copyAsImage(){

const btn = document.querySelector('.btn-copy');

btn.innerText = "⏳ GENEROWANIE...";

const canvas = await html2canvas(
document.getElementById('prescription-capture'),
{
backgroundColor:"#ffffff",
scale:3
}
);

canvas.toBlob(async(blob)=>{

try{

const item = new ClipboardItem({
"image/png": blob
});

await navigator.clipboard.write([item]);

btn.innerText = "✅ SKOPIOWANO";

setTimeout(()=>{
btn.innerText = "📸 KOPIUJ RECEPTĘ";
},2000);

}
catch{

alert("Nie udało się skopiować obrazu.");

}

});

}

</script>

</body>
</html>
